<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneCloud Support Chat Widget</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .demo-container {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        .demo-header {
            color: white;
            margin-bottom: 40px;
        }

        .demo-header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .demo-header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        /* Chat Widget Styles */
        .onecloud-chat-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .chat-floating-button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .chat-floating-button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(37, 99, 235, 0.4);
        }

        .chat-floating-button:active {
            transform: scale(0.95);
        }

        .chat-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .chat-panel {
            position: absolute;
            bottom: 80px;
            right: 0;
            width: 380px;
            height: 600px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transform: scale(0.8) translateY(20px);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .chat-panel.open {
            transform: scale(1) translateY(0);
            opacity: 1;
            visibility: visible;
        }

        .chat-header {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .chat-title {
            flex: 1;
        }

        .chat-title h3 {
            font-size: 16px;
            margin-bottom: 2px;
        }

        .chat-status {
            font-size: 12px;
            opacity: 0.8;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }

        .status-dot.offline {
            background: #ef4444;
            animation: none;
        }

        .chat-controls {
            display: flex;
            gap: 10px;
        }

        .chat-control-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .chat-control-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .chat-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-welcome {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #e5e7eb;
            background: #f9fafb;
        }

        .chat-welcome h4 {
            color: #1f2937;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .chat-welcome p {
            color: #6b7280;
            font-size: 14px;
            line-height: 1.4;
        }

        .quick-replies {
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            border-bottom: 1px solid #e5e7eb;
            background: #f9fafb;
        }

        .quick-reply-btn {
            background: white;
            border: 1px solid #d1d5db;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 13px;
            color: #374151;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-reply-btn:hover {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #ffffff;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            animation: messageSlide 0.3s ease;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.user .message-bubble {
            background: #2563eb;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot .message-bubble {
            background: #f3f4f6;
            color: #1f2937;
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 4px;
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 12px 16px;
            background: #f3f4f6;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            width: fit-content;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #9ca3af;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }

        .chat-input-container {
            padding: 15px;
            border-top: 1px solid #e5e7eb;
            background: white;
        }

        .chat-input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .chat-input {
            flex: 1;
            border: 1px solid #d1d5db;
            border-radius: 20px;
            padding: 10px 15px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            resize: none;
            max-height: 100px;
        }

        .chat-input:focus {
            border-color: #2563eb;
        }

        .chat-send-btn {
            background: #2563eb;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .chat-send-btn:hover:not(:disabled) {
            background: #1d4ed8;
            transform: scale(1.05);
        }

        .chat-send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .chat-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .handoff-btn {
            flex: 1;
            background: #f59e0b;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .handoff-btn:hover {
            background: #d97706;
        }

        .lang-toggle {
            background: #6b7280;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .lang-toggle:hover {
            background: #4b5563;
        }

        .offline-message {
            text-align: center;
            padding: 20px;
            color: #6b7280;
            font-size: 14px;
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .onecloud-chat-widget {
                bottom: 10px;
                right: 10px;
                left: 10px;
            }

            .chat-panel {
                width: 100%;
                height: 80vh;
                max-height: 600px;
                bottom: 70px;
                right: 0;
            }

            .message-bubble {
                max-width: 85%;
            }

            .quick-replies {
                padding: 10px;
            }

            .quick-reply-btn {
                font-size: 12px;
                padding: 6px 10px;
            }
        }

        /* Icon styles */
        .icon {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .icon-sm {
            width: 16px;
            height: 16px;
        }
    </style>
</head>
<body>
    <div id="demo-root"></div>
    <div id="chat-root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Translation data
        const translations = {
            en: {
                welcome: "Welcome to OneCloud Support! How can I help you today?",
                subtitle: "We typically respond in a few minutes",
                quickReplies: [
                    "Pricing Information",
                    "Technical Support", 
                    "Account Setup",
                    " Billing Questions"
                ],
                placeholder: "Type your message...",
                send: "Send",
                    handoff: "Talk to Human",
                    langToggle: "မြန်မာ",
                    typing: "Agent is typing...",
                    offlineTitle: "Currently Offline",
                    offlineMessage: "We're currently offline. Please leave a message and we'll get back to you soon.",
                    agentName: "Support Agent",
                    onlineStatus: "Online",
                    offlineStatus: "Offline"
                },
                mm: {
                    welcome: "OneCloud Support မှကြိုဆိုပါတယ်! ကျေးဇူးပြုပြီး ဘာများကူညီပေးရမလဲ?",
                    subtitle: "ပုံမှန်အားဖြင့် မိနစ်အနည်းငယ်အတွင်း ပြန်လည်တုံ့ပြန်ပေးပါတယ်",
                    quickReplies: [
                        "စျေးနှုန်းထားသတင်း",
                        "နည်းပညာအထောက်အပံ့",
                        "အကောင့်ဖွင့်ခြင်း",
                        "ငွေပေးချေမှုမေးခွန်းများ"
                    ],
                    placeholder: "သင့်မက်ဆေ့ချ်ကိုရိုက်ထည့်ပါ...",
                    send: "ပို့မည်",
                    handoff: "လူနှင့်စကားပြောမည်",
                    langToggle: "English",
                    typing: "ကိုယ်စားလှယ် ရိုက်နေပါသည်...",
                    offlineTitle: "လောလောဆယ်ဖြစ်နေပါသည်",
                    offlineMessage: "လောလောဆယ်ဖြစ်နေပါသည်။ မက်ဆေ့ချ်ချန်းပြီး ပြန်လည်ဆက်သွယ်ပေးပါမည်။",
                    agentName: "အထောက်အပံ့ကိုယ်စားလှယ်",
                    onlineStatus: "အွန်လိုင်း",
                    offlineStatus: "အော့ဖ်လိုင်း"
                }
            };

        // Chat Icons Component
        const ChatIcons = {
            Message: () => (
                <svg className="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                </svg>
            ),
            Close: () => (
                <svg className="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            ),
            Minimize: () => (
                <svg className="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
            ),
            Send: () => (
                <svg className="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
            ),
            User: () => (
                <svg className="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
            )
        };

        // Main Chat Widget Component
        const OneCloudChatWidget = () => {
            const [isOpen, setIsOpen] = useState(false);
            const [messages, setMessages] = useState([]);
            const [inputText, setInputText] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [isOnline, setIsOnline] = useState(true);
            const [language, setLanguage] = useState('en');
            const [unreadCount, setUnreadCount] = useState(0);
            const messagesEndRef = useRef(null);
            const inputRef = useRef(null);

            const t = translations[language];

            useEffect(() => {
                // Simulate online/offline status changes
                const interval = setInterval(() => {
                    setIsOnline(prev => Math.random() > 0.1); // 90% chance to be online
                }, 30000);

                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                scrollToBottom();
            }, [messages]);

            useEffect(() => {
                if (isOpen) {
                    setUnreadCount(0);
                    inputRef.current?.focus();
                }
            }, [isOpen]);

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            };

            const toggleChat = () => {
                setIsOpen(!isOpen);
            };

            const handleLanguageToggle = () => {
                setLanguage(prev => prev === 'en' ? 'mm' : 'en');
            };

            const handleQuickReply = (reply) => {
                sendMessage(reply);
            };

            const sendMessage = (text = inputText) => {
                if (!text.trim()) return;

                const userMessage = {
                    id: Date.now(),
                    text: text.trim(),
                    sender: 'user',
                    timestamp: new Date()
                };

                setMessages(prev => [...prev, userMessage]);
                setInputText('');

                if (!isOpen) {
                    setUnreadCount(prev => prev + 1);
                }

                // Simulate bot response
                setIsTyping(true);
                setTimeout(() => {
                    setIsTyping(false);
                    const botResponse = generateBotResponse(text);
                    setMessages(prev => [...prev, botResponse]);
                    
                    if (!isOpen) {
                        setUnreadCount(prev => prev + 1);
                    }
                }, 1500);
            };

            const generateBotResponse = (userMessage) => {
                const responses = {
                    en: [
                        "Thank you for your message! Our team will assist you shortly.",
                        "I understand your concern. Let me help you with that.",
                        "That's a great question! Let me find the best solution for you.",
                        "I'm here to help! Could you provide more details about your issue?"
                    ],
                    mm: [
                        "သင့်မက်ဆေ့ချ်အတွက်ကျေးဇူးတင်ပါတယ်! ကျွန်ုပ်တို့အဖွဲ့မှ မကြာမီအကူအညီပေးပါမည်။",
                        "သင့်စိတ်ပူပန်မှုကိုနားလည်ပါတယ်။ ကျွန်ုပ်ကထိုအရာကိုကူညီပေးပါမည်။",
                        "စိတ်ဝင်စားဖွယ်ကောင်းသောမေးခွန်းပါ! သင့်အတွက်အကောင်းဆုံးဖြေရှင်းချက်ကိုရှာပါမည်။",
                        "ကူညီရန်ရှိပါတယ်! သင့်ပြဿနာအကြောင်းအရာအသေးစိတ်ပေးပါနိုင်မည်လား?"
                    ]
                };

                const langResponses = responses[language];
                const randomResponse = langResponses[Math.floor(Math.random() * langResponses.length)];

                return {
                    id: Date.now() + 1,
                    text: randomResponse,
                    sender: 'bot',
                    timestamp: new Date()
                };
            };

            const handleHandoff = () => {
                const handoffMessage = {
                    id: Date.now(),
                    text: language === 'en' 
                        ? "Connecting you to a human agent. Please wait..."
                        : "လူကိုယ်စားလှယ်နှင့်ဆက်သွယ်နေပါသည်။ ခေတ္တစောင့်ဆိုင်းပါ...",
                    sender: 'bot',
                    timestamp: new Date()
                };
                setMessages(prev => [...prev, handoffMessage]);
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            };

            const formatTime = (date) => {
                return date.toLocaleTimeString(language === 'en' ? 'en-US' : 'my-MM', {
                    hour: '2-digit',
                    minute: '2-digit'
                });
            };

            return (
                <div className="onecloud-chat-widget">
                    {/* Floating Button */}
                    {!isOpen && (
                        <button 
                            className="chat-floating-button"
                            onClick={toggleChat}
                            aria-label="Open chat"
                        >
                            <ChatIcons.Message />
                            {unreadCount > 0 && (
                                <span className="chat-badge">{unreadCount}</span>
                            )}
                        </button>
                    )}

                    {/* Chat Panel */}
                    <div className={`chat-panel ${isOpen ? 'open' : ''}`}>
                        {/* Header */}
                        <div className="chat-header">
                            <div className="chat-header-info">
                                <div className="chat-avatar">OC</div>
                                <div className="chat-title">
                                    <h3>{t.agentName}</h3>
                                    <div className="chat-status">
                                        <span className={`status-dot ${!isOnline ? 'offline' : ''}`}></span>
                                        {isOnline ? t.onlineStatus : t.offlineStatus}
                                    </div>
                                </div>
                            </div>
                            <div className="chat-controls">
                                <button 
                                    className="chat-control-btn"
                                    onClick={handleLanguageToggle}
                                    title="Toggle language"
                                >
                                    {language === 'en' ? 'မြ' : 'En'}
                                </button>
                                <button 
                                    className="chat-control-btn"
                                    onClick={toggleChat}
                                    title="Minimize"
                                >
                                    <ChatIcons.Minimize />
                                </button>
                            </div>
                        </div>

                        {/* Body */}
                        <div className="chat-body">
                            {isOnline ? (
                                <>
                                    {/* Welcome Section */}
                                    {messages.length === 0 && (
                                        <>
                                            <div className="chat-welcome">
                                                <h4>{t.welcome}</h4>
                                                <p>{t.subtitle}</p>
                                            </div>
                                            <div className="quick-replies">
                                                {t.quickReplies.map((reply, index) => (
                                                    <button
                                                        key={index}
                                                        className="quick-reply-btn"
                                                        onClick={() => handleQuickReply(reply)}
                                                    >
                                                        {reply}
                                                    </button>
                                                ))}
                                            </div>
                                        </>
                                    )}

                                    {/* Messages */}
                                    <div className="chat-messages">
                                        {messages.map((message) => (
                                            <div 
                                                key={message.id}
                                                className={`message ${message.sender}`}
                                            >
                                                <div className="message-bubble">
                                                    <div>{message.text}</div>
                                                    <div className="message-time">
                                                        {formatTime(message.timestamp)}
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                        
                                        {isTyping && (
                                            <div className="message bot">
                                                <div className="typing-indicator">
                                                    <div className="typing-dot"></div>
                                                    <div className="typing-dot"></div>
                                                    <div className="typing-dot"></div>
                                                </div>
                                            </div>
                                        )}
                                        <div ref={messagesEndRef} />
                                    </div>
                                </>
                            ) : (
                                <div className="offline-message">
                                    <h4>{t.offlineTitle}</h4>
                                    <p>{t.offlineMessage}</p>
                                </div>
                            )}

                            {/* Input */}
                            {isOnline && (
                                <div className="chat-input-container">
                                    <div className="chat-input-wrapper">
                                        <textarea
                                            ref={inputRef}
                                            className="chat-input"
                                            placeholder={t.placeholder}
                                            value={inputText}
                                            onChange={(e) => setInputText(e.target.value)}
                                            onKeyPress={handleKeyPress}
                                            rows={1}
                                        />
                                        <button
                                            className="chat-send-btn"
                                            onClick={() => sendMessage()}
                                            disabled={!inputText.trim()}
                                            title={t.send}
                                        >
                                            <ChatIcons.Send />
                                        </button>
                                    </div>
                                    <div className="chat-actions">
                                        <button className="handoff-btn" onClick={handleHandoff}>
                                            <ChatIcons.User style={{width: '14px', height: '14px', marginRight: '5px', display: 'inline-block'}} />
                                            {t.handoff}
                                        </button>
                                        <button className="lang-toggle" onClick={handleLanguageToggle}>
                                            {t.langToggle}
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // Demo Page Component
        const DemoPage = () => (
            <div className="demo-container">
                <div className="demo-header">
                    <h1>OneCloud Support Chat Widget</h1>
                    <p>Professional, responsive, and multilingual customer support solution</p>
                </div>
            </div>
        );

        // Main App
        const App = () => (
            <>
                <DemoPage />
                <OneCloudChatWidget />
            </>
        );

        // Render the app
        ReactDOM.render(<App />, document.getElementById('demo-root'));
        ReactDOM.render(<OneCloudChatWidget />, document.getElementById('chat-root'));
    </script>
</body>
</html>
